appId: com.refora.app
productName: Refora
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
asar: true
asarUnpack:
  - '**/*.node'
mac:
  target:
    - dmg
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
