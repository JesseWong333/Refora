appId: com.refora.app
productName: Refora
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
extraResources:
  - from: build/agent-runner
    to: agent-runner
    filter:
      - '**/*'
      - '!module-cache{,/**}'
  - from: resources/mineru_worker.py
    to: mineru/mineru_worker.py
  - from: resources/ddgs_worker.py
    to: web-search/ddgs_worker.py
  - from: resources/agent/worker.py
    to: agent-python/worker.py
  - from: python/agent
    to: agent-python
    filter:
      - pyproject.toml
      - uv.lock
asar: true
asarUnpack:
  - '**/*.node'
mac:
  binaries:
    - Contents/Resources/agent-runner/refora-agent-broker
    - Contents/Resources/agent-runner/ReforaAgentRunner.app/Contents/MacOS/ReforaAgentRunner
  target:
    - dmg
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  notarize: true
