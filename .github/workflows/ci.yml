name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify and package
    runs-on: macos-24
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit & Component Tests
        run: npm run test

      - name: Workspace Card Interaction E2E
        run: npm run test:e2e:workspace-card

      - name: Package macOS application
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run package -- --publish never

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: Refora-macOS-${{ github.sha }}
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 14
